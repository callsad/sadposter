<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>POSTER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=Spectral:wght@400;600&family=Geologica:wght@300;400;500&display=swap');

    :root {
      --bg: #0c0c0c;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: #252525;
      --border-hi: #3a3a3a;
      --text: #dcdcdc;
      --dim: #666;
      --dim2: #444;
      --accent: #e0341c;
      --accent-hi: #ff4433;
      --green: #3fb950;
      --blue: #4a9eff;
      --mono: 'IBM Plex Mono', monospace;
      --ui-font: 'IBM Plex Sans', sans-serif;
      --r: 3px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ui-font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 96px;
    }

    .wrap { max-width: 640px; margin: 0 auto; padding: 0 18px; }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .nav-wordmark {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 18px;
      user-select: none;
      flex-shrink: 0;
    }

    .nav-wordmark em { color: var(--accent); font-style: normal; }

    .nav-tabs { display: flex; margin-left: auto; }

    .nav-tab {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim2);
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      padding: 0 20px;
      cursor: pointer;
      position: relative;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform .2s;
    }

    .nav-tab.active { color: var(--text); }
    .nav-tab.active::after { transform: scaleX(1); }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── URL row ── */
    .url-row { display: flex; gap: 8px; margin-bottom: 24px; }

    .url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--mono);
      font-size: 16px;
      padding: 13px 14px;
      outline: none;
      transition: border-color .15s;
      min-width: 0;
    }

    .url-input:focus { border-color: var(--border-hi); }
    .url-input::placeholder { color: var(--dim2); }

    .btn-build {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 20px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }

    .btn-build:active:not(:disabled) { background: var(--accent-hi); }
    .btn-build:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Progress ── */
    #progress {
      display: none;
      margin-bottom: 24px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }

    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim2);
      transition: color .2s;
    }

    .step-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border-hi);
      flex-shrink: 0;
      transition: background .2s;
    }

    .step.active { color: var(--text); }
    .step.active .step-dot { background: var(--accent); animation: blink .9s infinite; }
    .step.done { color: var(--dim); }
    .step.done .step-dot { background: var(--green); animation: none; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── Result ── */
    #result { display: none; }

    .meta-card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 18px;
    }

    .cover {
      width: 60px; height: 60px;
      border-radius: 2px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .meta-info { flex: 1; min-width: 0; }

    .meta-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      line-height: 1.6;
    }

    .meta-sub a { color: var(--blue); text-decoration: none; }

    /* ── Toolbar ── */
    .toolbar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }

    .tb-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--dim);
      font-family: var(--mono);
      font-size: 12px;
      padding: 9px 12px;
      cursor: pointer;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: color .1s, background .1s;
    }

    .tb-btn:active { color: var(--text); background: var(--surface2); border-color: var(--border-hi); }

    /* ── Textarea ── */
    .draft-textarea {
      width: 100%;
      min-height: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: var(--r);
      border-top-right-radius: var(--r);
      border-bottom: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 16px;
      line-height: 1.75;
      padding: 14px;
      outline: none;
      resize: none;
      transition: border-color .15s;
      display: block;
    }

    .draft-textarea:focus { border-color: var(--border-hi); }

    /* ── Preview ── */
    .preview-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 7px 14px;
    }

    .preview-divider-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim2);
      flex-shrink: 0;
    }

    .preview-divider-line { flex: 1; height: 1px; background: var(--border); }

    .tg-mock {
      background: #17212b;
      border: 1px solid var(--border);
      border-top: none;
      border-bottom-left-radius: var(--r);
      border-bottom-right-radius: var(--r);
      overflow: hidden;
      margin-bottom: 8px;
    }

    .tg-cover-img { width: 100%; max-height: 260px; object-fit: cover; display: block; }

    .tg-cover-empty {
      height: 80px;
      background: #1c2733;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a3d4e;
      font-family: var(--mono);
      font-size: 10px;
    }

    .tg-body { padding: 10px 13px 12px; }

    .tg-text {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: #e8e8e8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tg-text b { font-weight: 600; }
    .tg-text a { color: #6ab3f3; text-decoration: none; }

    .tg-time {
      text-align: right;
      font-size: 11px;
      color: #4d6374;
      margin-top: 5px;
      font-family: -apple-system, sans-serif;
    }

    /* ── Draft footer ── */
    .draft-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 14px;
    }

    .char-count { font-family: var(--mono); font-size: 10px; color: var(--dim); }
    .char-count.over { color: var(--accent); }
    .parse-hint { font-family: var(--mono); font-size: 10px; color: var(--dim2); }

    /* ── Action row ── */
    .action-row { display: flex; gap: 8px; }

    .btn-secondary {
      background: var(--surface2);
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s;
      white-space: nowrap;
    }

    .btn-secondary:active { color: var(--text); }

    .btn-send-now {
      flex: 1;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-hi);
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 14px;
      cursor: pointer;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .btn-send-now:active:not(:disabled) { background: var(--border-hi); }
    .btn-send-now:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-schedule {
      flex: 1.4;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 14px;
      cursor: pointer;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .btn-schedule:active:not(:disabled) { background: var(--accent-hi); }
    .btn-schedule:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Schedule modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal-sheet {
      background: #1c1c1e;
      border-radius: 14px 14px 0 0;
      width: 100%;
      max-width: 640px;
      padding: 0 0 40px;
      animation: slideUp .22s ease;
    }

    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-handle {
      width: 36px; height: 4px;
      background: #48484a;
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 6px;
    }

    .modal-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 8px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Wheel picker ── */
    .picker-wrap {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 0;
      padding: 0 18px;
      position: relative;
      height: 200px;
      overflow: hidden;
    }

    /* Selection highlight bar */
    .picker-wrap::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 18px; right: 18px;
      transform: translateY(-50%);
      height: 40px;
      background: rgba(255,255,255,.06);
      border-radius: 6px;
      pointer-events: none;
      z-index: 1;
    }

    /* Fade masks */
    .picker-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, #1c1c1e 0%, transparent 35%, transparent 65%, #1c1c1e 100%);
      pointer-events: none;
      z-index: 2;
    }

    .picker-col {
      flex: 1;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 80px 0;
    }

    .picker-col::-webkit-scrollbar { display: none; }

    .picker-item {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      font-family: -apple-system, sans-serif;
      font-size: 18px;
      color: var(--dim);
      cursor: pointer;
      transition: color .1s;
      user-select: none;
      white-space: nowrap;
    }

    /* Date col wider */
    .picker-col.col-date { flex: 2.2; }
    .picker-col.col-date .picker-item { justify-content: flex-start; padding-left: 12px; }
    .picker-col.col-hour .picker-item,
    .picker-col.col-min .picker-item { font-variant-numeric: tabular-nums; }
    .picker-col.col-ampm .picker-item { font-size: 15px; }

    /* Separator between hour and min */
    .picker-sep {
      display: flex;
      align-items: center;
      font-family: -apple-system, sans-serif;
      font-size: 20px;
      color: var(--text);
      padding: 0 2px;
      padding-bottom: 0;
      z-index: 3;
    }

    .modal-confirm {
      display: flex;
      gap: 10px;
      padding: 16px 18px 0;
    }

    .btn-confirm {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-confirm:active { background: var(--accent-hi); }

    .schedule-summary {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      text-align: center;
      padding: 8px 18px 0;
    }


    /* ── Post fields ── */
    .post-fields {
      margin-bottom: 10px;
    }

    .pf-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 5px;
    }

    .pf-row.editing {
      border-color: var(--border-hi);
    }

    .pf-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim2);
      flex-shrink: 0;
      width: 42px;
      padding-top: 2px;
    }

    .pf-value {
      flex: 1;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      min-width: 0;
    }

    .pf-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      resize: none;
      width: 100%;
      min-height: 22px;
      padding: 0;
    }

    .pf-edit-btn {
      background: none;
      border: none;
      color: var(--dim2);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 0 0 4px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color .12s;
    }

    .pf-edit-btn:active { color: var(--text); }

    .pf-row.editing .pf-edit-btn { color: var(--accent); }

    .pf-review-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim2);
      margin-bottom: 6px;
    }

    /* ── Settings ── */
    .settings-section { margin-bottom: 32px; }

    .settings-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim2);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 12px; }
    .field-row { display: flex; gap: 10px; }
    .field-row .field { flex: 1; }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--dim);
      margin-bottom: 5px;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus,
    .field textarea:focus { border-color: var(--border-hi); }
    .field textarea { min-height: 80px; resize: vertical; line-height: 1.6; }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 12px;
    }

    .toggle-label { font-family: var(--mono); font-size: 11px; color: var(--dim); }

    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      border-radius: 11px;
      transition: background .2s, border-color .2s;
      cursor: pointer;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--dim);
      transition: transform .2s, background .2s;
    }

    .toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked + .toggle-track::after { transform: translateX(18px); background: #fff; }

    #promptField { transition: opacity .2s; }
    #promptField.disabled { opacity: 0.35; pointer-events: none; }

    /* Appearance */
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }

    .color-swatch {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color .15s, transform .12s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .color-swatch:active { transform: scale(.9); }
    .color-swatch.selected { border-color: var(--text); }

    .font-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .font-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 8px 14px;
      font-size: 12px;
      color: var(--dim);
      cursor: pointer;
      transition: color .12s, border-color .12s;
      -webkit-tap-highlight-color: transparent;
    }

    .font-chip:active { color: var(--text); border-color: var(--border-hi); }
    .font-chip.selected { color: var(--text); border-color: var(--accent); }

    .btn-save {
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 22px;
      cursor: pointer;
      margin-top: 6px;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }

    .btn-save:active { background: rgba(63,185,80,.1); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; right: 18px;
      padding: 10px 15px;
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .18s, transform .18s;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { border-color: var(--green); color: var(--green); }
    #toast.err { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<nav>
  <div class="nav-wordmark">POSTER<em>.</em>release</div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="navCompose" onclick="showPage('compose')">Compose</button>
    <button class="nav-tab" id="navSettings" onclick="showPage('settings')">Settings</button>
  </div>
</nav>

<div class="wrap">

  <!-- ══ Compose ══ -->
  <div class="page active" id="pageCompose">

    <div class="url-row">
      <input
        type="text"
        id="spotifyUrl"
        class="url-input"
        placeholder="https://open.spotify.com/album/… or /track/…"

        <button class="tb-btn" onclick="tbWrap('<i>','</i>')"><i>I</i></button>

        <button class="tb-btn" onclick="tbInsert('\n• ')">• item</button>

      <textarea
        class="draft-textarea"

        oninput="onDraftInput()"

      ></textarea>

      <div class="preview-divider">
        <div class="preview-divider-label">Preview</div>
        <div class="preview-divider-line"></div>
      </div>
      <div class="tg-mock">
        <div id="previewCoverWrap"><div class="tg-cover-empty">cover appears after build</div></div>
        <div class="tg-body">
          <div class="tg-text" id="previewText"></div>
          <div class="tg-time" id="previewTime"></div>
        </div>
      </div>

      <div class="draft-footer">
        <div class="char-count" id="charCount">0 / 1024</div>

  <!-- ══ Settings ══ -->

          <div class="color-swatch" data-color="#2271c4" style="background:#2271c4" onclick="pickColor(this)"></div>
          <div class="color-swatch" data-color="#8b2ec4" style="background:#8b2ec4" onclick="pickColor(this)"></div>
          <div class="color-swatch" data-color="#c42e7e" style="background:#c42e7e" onclick="pickColor(this)"></div>
          <div class="color-swatch" data-color="#c4c4c4" style="background:#c4c4c4" onclick="pickColor(this)"></div>

          <div class="font-chip" data-font="'Geologica', sans-serif" style="font-family:'Geologica',sans-serif" onclick="pickFont(this)">Geologica</div>
          <div class="font-chip" data-font="'Spectral', serif" style="font-family:'Spectral',serif" onclick="pickFont(this)">Spectral</div>
          <div class="font-chip" data-font="-apple-system, sans-serif" style="font-family:-apple-system,sans-serif" onclick="pickFont(this)">System</div>

      <!-- Date column -->

    <div class="modal-confirm">

<div id="toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const DEFAULT_PROMPT =
  'Find 3–5 interesting facts about the album "{album}" by "{artist}" for a Russian-language ' +
  'Telegram music channel. Write in Russian. Start each fact with "• ". Facts only, no intro or outro.';

const LS = {
  SP_ID:    'sp_client_id',
  SP_SEC:   'sp_client_secret',
  ANTH:     'anthropic_key',
  TG_TOKEN: 'tg_bot_token',
  TG_CHAN:  'tg_channel_id',
  PROMPT:   'facts_prompt',
  ACCENT:   'ui_accent',
  FONT:     'ui_font',
  FACTS_ON: 'facts_enabled',
};

let coverUrl = '';
let draftFixed = { title: '', date: '', facts: '', link: '', linkText: 'Слушать' };

// ── Nav ───────────────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const key = id.charAt(0).toUpperCase() + id.slice(1);
  document.getElementById('page' + key).classList.add('active');
  document.getElementById('nav'  + key).classList.add('active');
  if (id === 'settings') loadSettingsUI();
}

// ── Settings ──────────────────────────────────────────────────────────────────
function cfg(key) { return localStorage.getItem(key) || ''; }

function loadSettingsUI() {
  document.getElementById('cfgSpId').value      = cfg(LS.SP_ID);
  document.getElementById('cfgSpSecret').value  = cfg(LS.SP_SEC);
  document.getElementById('cfgAnthKey').value   = cfg(LS.ANTH);
  document.getElementById('cfgTgToken').value   = cfg(LS.TG_TOKEN);
  document.getElementById('cfgTgChannel').value = cfg(LS.TG_CHAN);
  document.getElementById('cfgPrompt').value    = cfg(LS.PROMPT) || DEFAULT_PROMPT;

  const factsOn = cfg(LS.FACTS_ON) !== 'false';
  document.getElementById('cfgFactsEnabled').checked = factsOn;
  document.getElementById('promptField').classList.toggle('disabled', !factsOn);

  const accent = cfg(LS.ACCENT) || '#e0341c';
  document.querySelectorAll('.color-swatch').forEach(s =>
    s.classList.toggle('selected', s.dataset.color === accent));

  const font = cfg(LS.FONT) || "'IBM Plex Sans', sans-serif";
  document.querySelectorAll('.font-chip').forEach(c =>
    c.classList.toggle('selected', c.dataset.font === font));
}

function saveSettings() {
  localStorage.setItem(LS.SP_ID,    document.getElementById('cfgSpId').value.trim());
  localStorage.setItem(LS.SP_SEC,   document.getElementById('cfgSpSecret').value.trim());
  localStorage.setItem(LS.ANTH,     document.getElementById('cfgAnthKey').value.trim());
  localStorage.setItem(LS.TG_TOKEN, document.getElementById('cfgTgToken').value.trim());
  localStorage.setItem(LS.TG_CHAN,  document.getElementById('cfgTgChannel').value.trim());
  localStorage.setItem(LS.PROMPT,   document.getElementById('cfgPrompt').value.trim());
  localStorage.setItem(LS.FACTS_ON, document.getElementById('cfgFactsEnabled').checked ? 'true' : 'false');
  applyAppearance();
  toast('Saved', 'ok');
}

function togglePromptField() {
  const on = document.getElementById('cfgFactsEnabled').checked;
  document.getElementById('promptField').classList.toggle('disabled', !on);
  localStorage.setItem(LS.FACTS_ON, on ? 'true' : 'false');
}

function pickColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  localStorage.setItem(LS.ACCENT, el.dataset.color);
  applyAppearance();
}

function pickFont(el) {
  document.querySelectorAll('.font-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  localStorage.setItem(LS.FONT, el.dataset.font);
  applyAppearance();
}

function applyAppearance() {
  const accent = cfg(LS.ACCENT) || '#e0341c';
  const font   = cfg(LS.FONT)   || "'IBM Plex Sans', sans-serif";
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--accent-hi', accent);
  document.body.style.fontFamily = font;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtDate(d) {
  const p = d.split('-');
  if (p.length === 3) return p[2]+'.'+p[1]+'.'+p[0];
  if (p.length === 2) return p[1]+'.'+p[0];
  return d;
}

function extractAlbumId(url) { const m = url.match(/\/album\/([A-Za-z0-9]+)/); return m ? m[1] : null; }
function extractTrackId(url) { const m = url.match(/\/track\/([A-Za-z0-9]+)/); return m ? m[1] : null; }
function step(n, state) { document.getElementById('s'+n).className = 'step '+state; }

// ── Spotify ───────────────────────────────────────────────────────────────────
async function spotifyToken(id, secret) {
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Authorization': 'Basic '+btoa(id+':'+secret), 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'grant_type=client_credentials'
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error('Spotify auth: '+(e.error_description||r.status)); }
  return (await r.json()).access_token;
}

async function spotifyAlbum(albumId, token) {
  const r = await fetch('https://api.spotify.com/v1/albums/'+albumId, { headers: { 'Authorization': 'Bearer '+token } });
  if (!r.ok) throw new Error('Spotify album: '+r.status);
  const d = await r.json();
  return { name: d.name, artist: d.artists.map(a=>a.name).join(', '), releaseDate: d.release_date, coverUrl: d.images[0]?.url||'', id: d.id };
}

async function albumIdFromTrack(trackId, token) {
  const r = await fetch('https://api.spotify.com/v1/tracks/'+trackId, { headers: { 'Authorization': 'Bearer '+token } });
  if (!r.ok) throw new Error('Spotify track: '+r.status);
  return (await r.json()).album.id;
}

// ── Anthropic ─────────────────────────────────────────────────────────────────
async function generateFacts(artist, album, apiKey, promptTpl) {
  const userMsg = promptTpl.replace(/\{artist\}/g, artist).replace(/\{album\}/g, album);
  const system = 'You are a music expert. Reply strictly in Russian. Start each fact with "• ". No intro or outro.';
  let messages = [{ role: 'user', content: userMsg }];

  for (let i = 0; i < 10; i++) {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-haiku-4-5', max_tokens: 1024, system, tools: [{ type: 'web_search_20250305', name: 'web_search' }], messages })
    });

    if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error('Anthropic: '+(e.error?.message||resp.status)); }
    const data = await resp.json();
    messages = [...messages, { role: 'assistant', content: data.content }];

    if (data.stop_reason === 'end_turn')
      return data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();

    if (data.stop_reason === 'tool_use') {
      const uses = data.content.filter(b=>b.type==='tool_use');
      const results = uses.map(u => ({ type: 'tool_result', tool_use_id: u.id, content: 'Search complete' }));
      if (results.length) messages = [...messages, { role: 'user', content: results }];
    }
  }
  throw new Error('Agent loop limit exceeded');
}

// ── Telegram ──────────────────────────────────────────────────────────────────
async function tgSendPhoto(token, chatId, photo, caption) {
  const r = await fetch('https://api.telegram.org/bot'+token+'/sendPhoto', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: chatId, photo, caption, parse_mode: 'HTML' })
  });
  const d = await r.json();
  if (!d.ok) throw new Error('Telegram: '+(d.description||'unknown error'));
  return d;
}

// ── Preview ───────────────────────────────────────────────────────────────────
function renderPreview() {
  const raw = draftFixed.title ? assemblePost() : document.getElementById('draftText').value;

  const wrap = document.getElementById('previewCoverWrap');
  wrap.innerHTML = coverUrl
    ? '<img class="tg-cover-img" src="'+coverUrl+'" alt="">'
    : '<div class="tg-cover-empty">cover appears after build</div>';

  const html = raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/&lt;(\/?)(b|i|u|s|code)&gt;/g, '<$1$2>')
    .replace(/&lt;a href="([^"]*)"&gt;/g, '<a href="$1">')
    .replace(/&lt;\/a&gt;/g, '</a>')
    .replace(/\n/g, '<br>');

  document.getElementById('previewText').innerHTML = html;

  const now = new Date();
  document.getElementById('previewTime').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

function onDraftInput() { updateCount(); renderPreview(); }

function updateCount() {
  const full = draftFixed.title ? assemblePost() : document.getElementById('draftText').value;
  const n = full.length;
  const el = document.getElementById('charCount');
  el.textContent = n + ' / 1024';
  el.className = 'char-count' + (n > 1024 ? ' over' : '');
}

// ── Toolbar ───────────────────────────────────────────────────────────────────
function tbWrap(open, close) {
  const ta = document.getElementById('draftText');
  const s = ta.selectionStart, e = ta.selectionEnd;
  ta.setRangeText(open + ta.value.slice(s, e) + close, s, e, 'end');
  ta.focus(); onDraftInput();
}

function tbInsert(text) {
  const ta = document.getElementById('draftText');
  ta.setRangeText(text, ta.selectionStart, ta.selectionStart, 'end');
  ta.focus(); onDraftInput();
}

// ── Build ─────────────────────────────────────────────────────────────────────
async function buildDraft() {
  const url = document.getElementById('spotifyUrl').value.trim();
  if (!url) { toast('Paste a Spotify album or track link', 'err'); return; }

  let albumId = extractAlbumId(url);
  const trackId = !albumId ? extractTrackId(url) : null;
  if (!albumId && !trackId) { toast('Need a Spotify album or track URL', 'err'); return; }

  const spId = cfg(LS.SP_ID), spSecret = cfg(LS.SP_SEC);
  if (!spId || !spSecret) { toast('No Spotify credentials — open Settings', 'err'); showPage('settings'); return; }

  const anthKey = cfg(LS.ANTH);
  const prompt  = cfg(LS.PROMPT) || DEFAULT_PROMPT;

  document.getElementById('buildBtn').disabled = true;
  document.getElementById('result').style.display = 'none';
  document.getElementById('progress').style.display = 'block';
  [1,2,3,4].forEach(n => step(n, 'idle'));

  try {
    step(1, 'active');
    const token = await spotifyToken(spId, spSecret);
    if (trackId) albumId = await albumIdFromTrack(trackId, token);
    const album = await spotifyAlbum(albumId, token);
    step(1, 'done');

    step(2, 'active');
    const albumLink = 'https://album.link/s/'+albumId;
    step(2, 'done');

    const factsEnabled = cfg(LS.FACTS_ON) !== 'false';
    let facts = '';
    if (factsEnabled && anthKey) {
      step(3, 'active');
      facts = await generateFacts(album.artist, album.name, anthKey, prompt);
      step(3, 'done');
    } else {
      step(3, 'done');
      if (factsEnabled) facts = '• (facts skipped — no Anthropic API Key in Settings)';
    }

    step(4, 'active');
    const date = fmtDate(album.releaseDate);

    coverUrl = album.coverUrl;
    draftFixed = {
      title:  '<b>'+esc(album.artist)+'</b> — <b>'+esc(album.name)+'</b>',
      date:   date,
      facts:  facts,
      link:   albumLink,
      linkText: 'Слушать'
    };

    document.getElementById('metaCard').innerHTML =
      (album.coverUrl ? '<img class="cover" src="'+album.coverUrl+'" alt="">' : '') +
      '<div class="meta-info">' +
        '<div class="meta-title">'+esc(album.name)+'</div>' +
        '<div class="meta-sub">'+esc(album.artist)+'</div>' +
        '<div class="meta-sub">'+date+'</div>' +
        '<div class="meta-sub"><a href="'+albumLink+'" target="_blank">'+albumLink+'</a></div>' +
      '</div>';

    renderFixedFields();
    document.getElementById('draftText').value = '';
    document.getElementById('postFields').style.display = 'block';
    document.getElementById('reviewLabel').style.display = 'block';
    onDraftInput();
    document.getElementById('result').style.display = 'block';
    step(4, 'done');

    setTimeout(() => {
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);

  } catch (err) {
    toast(err.message, 'err');
    console.error('[buildDraft]', err);
  } finally {
    document.getElementById('buildBtn').disabled = false;
  }
}

// ── Assemble full post ───────────────────────────────────────────────────────
function assemblePost() {
  if (!draftFixed.title) return document.getElementById('draftText').value;

  const factsBlock = draftFixed.facts
    ? '\n\n' + draftFixed.facts
    : '';

  const review = document.getElementById('draftText').value.trim();
  const reviewBlock = review ? '\n\n' + review : '';

  return '🎵 ' + draftFixed.title +
    '\n\n🗓 ' + draftFixed.date +
    factsBlock +
    reviewBlock +
    '\n\n<a href="' + draftFixed.link + '">' + draftFixed.linkText + '</a>';
}

// ── Render fixed fields ──────────────────────────────────────────────────────
function renderFixedFields() {
  setPfVal('Title', draftFixed.title.replace(/<[^>]+>/g, ''));
  setPfVal('Date',  draftFixed.date);
  if (draftFixed.facts) {
    document.getElementById('pfRowFacts').style.display = 'flex';
    setPfVal('Facts', draftFixed.facts);
  } else {
    document.getElementById('pfRowFacts').style.display = 'none';
  }
  setPfVal('Link', draftFixed.linkText + ' → ' + draftFixed.link);
}

function setPfVal(field, text) {
  const el = document.getElementById('pfVal'+field);
  if (el) el.textContent = text;
}

function togglePfEdit(field) {
  const row = document.getElementById('pfRow'+field);
  const valEl = document.getElementById('pfVal'+field);
  const btn = row.querySelector('.pf-edit-btn');

  if (row.classList.contains('editing')) {
    // Save
    const inp = row.querySelector('.pf-input');
    const val = inp.value;
    if (field === 'Title') {
      // store raw; will wrap in <b> around artist—album split
      draftFixed.title = esc(val);
    } else if (field === 'Date') {
      draftFixed.date = val;
    } else if (field === 'Facts') {
      draftFixed.facts = val;
    } else if (field === 'Link') {
      draftFixed.linkText = val;
    }
    inp.remove();
    valEl.style.display = '';
    row.classList.remove('editing');
    btn.textContent = 'edit';
    onDraftInput();
  } else {
    // Enter edit mode
    valEl.style.display = 'none';
    const inp = document.createElement(field === 'Facts' ? 'textarea' : 'input');
    inp.className = 'pf-input';
    if (field === 'Facts') {
      inp.style.minHeight = '60px';
      inp.style.resize = 'none';
      inp.value = draftFixed.facts;
    } else if (field === 'Title') {
      inp.value = draftFixed.title.replace(/<[^>]+>/g, '');
    } else if (field === 'Date') {
      inp.value = draftFixed.date;
    } else if (field === 'Link') {
      inp.value = draftFixed.linkText;
    }
    inp.addEventListener('input', onDraftInput);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && field !== 'Facts') { e.preventDefault(); togglePfEdit(field); } });
    // Insert after label
    row.querySelector('.pf-label').after(inp);
    row.classList.add('editing');
    btn.textContent = 'done';
    inp.focus();
  }
}

// ── Send now ──────────────────────────────────────────────────────────────────
async function sendNow() {
  const token = cfg(LS.TG_TOKEN), channel = cfg(LS.TG_CHAN);
  if (!token || !channel) { toast('No Telegram credentials — open Settings', 'err'); showPage('settings'); return; }

  const text = draftFixed.title ? assemblePost() : document.getElementById('draftText').value;
  const btn = document.getElementById('sendNowBtn');
  btn.disabled = true; btn.textContent = 'Sending…';

  try {
    await tgSendPhoto(token, channel, coverUrl, text);
    toast('Sent!', 'ok');
    btn.textContent = '✓ Sent';
    setTimeout(() => { btn.textContent = 'Send now'; btn.disabled = false; }, 3000);
  } catch (err) {
    toast(err.message, 'err');
    btn.textContent = 'Send now'; btn.disabled = false;
  }
}

// ── Copy ──────────────────────────────────────────────────────────────────────
async function copyDraft() {
  try {
    await navigator.clipboard.writeText(draftFixed.title ? assemblePost() : document.getElementById('draftText').value);
    toast('Copied', 'ok');
  } catch { toast('Copy failed', 'err'); }
}

// ── Scheduler ─────────────────────────────────────────────────────────────────
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Default = nearest Tue (2) or Thu (4), 8:00 AM
function nearestTueThu() {
  const d = new Date();
  d.setHours(8, 0, 0, 0);
  d.setDate(d.getDate() + 1); // start from tomorrow
  while (d.getDay() !== 2 && d.getDay() !== 4) d.setDate(d.getDate() + 1);
  return d;
}

// Build date list: today + 60 days
function buildDateItems() {
  const items = [];
  const now = new Date(); now.setHours(0,0,0,0);
  for (let i = 0; i <= 60; i++) {
    const d = new Date(now); d.setDate(now.getDate() + i);
    items.push(d);
  }
  return items;
}

let pickerDates = [];
let pickerState = { dateIdx: 0, hour: 8, min: 0, ampm: 'AM' };

function openScheduler() {
  const token = cfg(LS.TG_TOKEN), channel = cfg(LS.TG_CHAN);
  if (!token || !channel) { toast('No Telegram credentials — open Settings', 'err'); showPage('settings'); return; }

  pickerDates = buildDateItems();
  const def = nearestTueThu();

  // Find default date index
  const defDay = new Date(def); defDay.setHours(0,0,0,0);
  pickerState.dateIdx = pickerDates.findIndex(d => d.getTime() === defDay.getTime());
  if (pickerState.dateIdx < 0) pickerState.dateIdx = 0;

  pickerState.hour  = def.getHours() % 12 || 12; // 8
  pickerState.min   = def.getMinutes();           // 0
  pickerState.ampm  = def.getHours() < 12 ? 'AM' : 'PM';

  buildCol('colDate', pickerDates.map((d,i) => {
    const isToday = i === 0;
    return isToday ? 'Today' : DAYS[d.getDay()]+' '+MONTHS[d.getMonth()]+' '+d.getDate();
  }), pickerState.dateIdx, v => { pickerState.dateIdx = v; updateSummary(); });

  buildCol('colHour', Array.from({length:12},(_,i)=>String(i+1)), pickerState.hour-1, v => { pickerState.hour = v+1; updateSummary(); });
  buildCol('colMin',  Array.from({length:60},(_,i)=>String(i).padStart(2,'0')), pickerState.min, v => { pickerState.min = v; updateSummary(); });
  buildCol('colAmpm', ['AM','PM'], pickerState.ampm === 'PM' ? 1 : 0, v => { pickerState.ampm = v===0?'AM':'PM'; updateSummary(); });

  updateSummary();
  document.getElementById('scheduleModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function buildCol(colId, items, selectedIdx, onChange) {
  const col = document.getElementById(colId);
  col.innerHTML = '';
  items.forEach((label, idx) => {
    const el = document.createElement('div');
    el.className = 'picker-item';
    el.textContent = label;
    col.appendChild(el);
  });

  // Scroll to selected
  requestAnimationFrame(() => {
    col.scrollTop = selectedIdx * 40;
  });

  // On scroll snap, detect which item is centred
  let scrollTimer;
  col.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const idx = Math.round(col.scrollTop / 40);
      onChange(Math.max(0, Math.min(idx, items.length - 1)));
    }, 80);
  }, { passive: true });
}

function updateSummary() {
  const d = pickerDates[pickerState.dateIdx];
  if (!d) return;
  const h = pickerState.hour;
  const m = String(pickerState.min).padStart(2,'0');
  const ap = pickerState.ampm;
  const label = DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+' at '+h+':'+m+' '+ap;
  document.getElementById('scheduleSummary').textContent = label;
}

function closeScheduler() {
  document.getElementById('scheduleModal').classList.remove('open');
  document.body.style.overflow = '';
}

function overlayClick(e) {
  if (e.target === document.getElementById('scheduleModal')) closeScheduler();
}

async function confirmSchedule() {
  const d = pickerDates[pickerState.dateIdx];
  if (!d) return;

  let h24 = pickerState.hour % 12;
  if (pickerState.ampm === 'PM') h24 += 12;

  const sendAt = new Date(d);
  sendAt.setHours(h24, pickerState.min, 0, 0);

  const msUntil = sendAt.getTime() - Date.now();

  if (msUntil < 0) { toast('That time is in the past', 'err'); return; }

  const token   = cfg(LS.TG_TOKEN);
  const channel = cfg(LS.TG_CHAN);
  const text    = draftFixed.header ? assemblePost() : document.getElementById('draftText').value;
  const cover   = coverUrl;

  const btn = document.querySelector('.btn-confirm');
  btn.textContent = 'Scheduled ✓';
  btn.disabled = true;

  setTimeout(async () => {
    try {
      await tgSendPhoto(token, channel, cover, text);
      toast('Scheduled post sent!', 'ok');
    } catch(err) {
      toast('Scheduled send failed: '+err.message, 'err');
    }
  }, msUntil);

  toast('Scheduled for '+document.getElementById('scheduleSummary').textContent, 'ok');
  closeScheduler();
  setTimeout(() => { btn.textContent = 'Schedule →'; btn.disabled = false; }, 3000);
}

applyAppearance();
