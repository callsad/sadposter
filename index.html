<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ПОСТЕР</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #0c0c0c;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: #252525;
      --border-hi: #3a3a3a;
      --text: #dcdcdc;
      --dim: #666;
      --dim2: #444;
      --red: #e0341c;
      --red-hi: #ff4433;
      --green: #3fb950;
      --blue: #4a9eff;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
      --r: 3px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 24px 96px;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 44px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      user-select: none;
    }

    .wordmark em { color: var(--red); font-style: normal; }

    .btn-ghost {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 5px 10px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--border-hi); }
    .btn-ghost.active { color: var(--text); border-color: var(--border-hi); }

    /* ── URL row ── */
    .url-row {
      display: flex;
      gap: 8px;
      margin-bottom: 36px;
    }

    .url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 13px 14px;
      outline: none;
      transition: border-color .15s;
      min-width: 0;
    }

    .url-input:focus { border-color: var(--border-hi); }
    .url-input::placeholder { color: var(--dim2); }

    .btn-build {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
      flex-shrink: 0;
    }

    .btn-build:hover:not(:disabled) { background: var(--red-hi); }

    .btn-build:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Progress ── */
    #progress {
      display: none;
      margin-bottom: 32px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }

    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim2);
      transition: color .2s;
    }

    .step-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border-hi);
      flex-shrink: 0;
      transition: background .2s;
    }

    .step.active { color: var(--text); }
    .step.active .step-dot { background: var(--red); animation: blink 0.9s infinite; }
    .step.done { color: var(--dim); }
    .step.done .step-dot { background: var(--green); animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ── Result ── */
    #result { display: none; }

    .meta-card {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 20px;
    }

    .cover {
      width: 72px;
      height: 72px;
      border-radius: 2px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .meta-info {
      flex: 1;
      min-width: 0;
    }

    .meta-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      line-height: 1.6;
    }

    .meta-sub a {
      color: var(--blue);
      text-decoration: none;
    }

    .draft-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
    }

    .draft-textarea {
      width: 100%;
      min-height: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.75;
      padding: 16px;
      outline: none;
      resize: vertical;
      margin-bottom: 8px;
      transition: border-color .15s;
      tab-size: 2;
    }

    .draft-textarea:focus { border-color: var(--border-hi); }

    .meta-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .char-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
    }

    .char-count.over { color: var(--red); }

    .parse-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim2);
    }

    .action-row {
      display: flex;
      gap: 8px;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 11px 16px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--border-hi); }

    .btn-send {
      flex: 1;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 11px 20px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-send:hover:not(:disabled) { background: var(--red-hi); }
    .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Settings ── */
    #settings {
      display: none;
      margin-top: 44px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .section-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 14px; }

    .field-row {
      display: flex;
      gap: 10px;
    }

    .field-row .field { flex: 1; }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--dim);
      margin-bottom: 5px;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus,
    .field textarea:focus { border-color: var(--border-hi); }

    .field textarea {
      min-height: 90px;
      resize: vertical;
      line-height: 1.6;
    }

    .btn-save {
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s;
    }

    .btn-save:hover { background: rgba(63,185,80,.08); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .18s, transform .18s;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { border-color: var(--green); color: var(--green); }
    #toast.err { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="wordmark">ПОСТЕР<em>.</em>release</div>
    <button class="btn-ghost" id="settingsBtn" onclick="toggleSettings()">Настройки</button>
  </header>

  <div class="url-row">
    <input
      type="text"
      id="spotifyUrl"
      class="url-input"
      placeholder="https://open.spotify.com/album/..."
      onkeydown="if(event.key==='Enter')buildDraft()"
    />
    <button class="btn-build" id="buildBtn" onclick="buildDraft()">Собрать</button>
  </div>

  <div id="progress">
    <div class="step" id="s1"><div class="step-dot"></div><span>Получение данных Spotify</span></div>
    <div class="step" id="s2"><div class="step-dot"></div><span>Сборка ссылок</span></div>
    <div class="step" id="s3"><div class="step-dot"></div><span>Генерация фактов (AI + web search)</span></div>
    <div class="step" id="s4"><div class="step-dot"></div><span>Сборка черновика</span></div>
  </div>

  <div id="result">
    <div class="meta-card" id="metaCard"></div>
    <div class="draft-label">Черновик — редактируй при необходимости</div>
    <textarea class="draft-textarea" id="draftText" oninput="updateCount()"></textarea>
    <div class="meta-footer">
      <div class="char-count" id="charCount">0 / 1024</div>
      <div class="parse-hint">parse_mode: HTML</div>
    </div>
    <div class="action-row">
      <button class="btn-secondary" onclick="copyDraft()">Копировать</button>
      <button class="btn-send" id="sendBtn" onclick="sendPost()">Отправить в Telegram →</button>
    </div>
  </div>

  <div id="settings">
    <div class="section-title">API / Конфигурация</div>

    <div class="field-row">
      <div class="field">
        <label>Spotify Client ID</label>
        <input type="text" id="cfgSpId" autocomplete="off">
      </div>
      <div class="field">
        <label>Spotify Client Secret</label>
        <input type="password" id="cfgSpSecret" autocomplete="off">
      </div>
    </div>

    <div class="field">
      <label>Anthropic API Key</label>
      <input type="password" id="cfgAnthKey" autocomplete="off">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Telegram Bot Token</label>
        <input type="password" id="cfgTgToken" autocomplete="off">
      </div>
      <div class="field">
        <label>Channel ID</label>
        <input type="text" id="cfgTgChannel" placeholder="@channel или -100…">
      </div>
    </div>

    <div class="field">
      <label>Промпт для фактов — переменные: {artist} {album}</label>
      <textarea id="cfgPrompt"></textarea>
    </div>

    <button class="btn-save" onclick="saveSettings()">Сохранить</button>
  </div>

</div>

<div id="toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const DEFAULT_PROMPT =
  `Найди 3–5 интересных фактов об альбоме "{album}" исполнителя "{artist}" для публикации ` +
  `в русскоязычном Telegram-канале о музыке. Пиши на русском языке. ` +
  `Каждый факт начинай с "• ". Только факты, без вступления и заключения.`;

const LS = {
  SP_ID:     'sp_client_id',
  SP_SEC:    'sp_client_secret',
  ANTH:      'anthropic_key',
  TG_TOKEN:  'tg_bot_token',
  TG_CHAN:   'tg_channel_id',
  PROMPT:    'facts_prompt',
};

// ── State ─────────────────────────────────────────────────────────────────────
let coverUrl = '';
let settingsOpen = false;

// ── Settings ──────────────────────────────────────────────────────────────────
function cfg(key) { return localStorage.getItem(key) || ''; }

function loadSettings() {
  document.getElementById('cfgSpId').value      = cfg(LS.SP_ID);
  document.getElementById('cfgSpSecret').value  = cfg(LS.SP_SEC);
  document.getElementById('cfgAnthKey').value   = cfg(LS.ANTH);
  document.getElementById('cfgTgToken').value   = cfg(LS.TG_TOKEN);
  document.getElementById('cfgTgChannel').value = cfg(LS.TG_CHAN);
  document.getElementById('cfgPrompt').value    = cfg(LS.PROMPT) || DEFAULT_PROMPT;
}

function saveSettings() {
  localStorage.setItem(LS.SP_ID,    document.getElementById('cfgSpId').value.trim());
  localStorage.setItem(LS.SP_SEC,   document.getElementById('cfgSpSecret').value.trim());
  localStorage.setItem(LS.ANTH,     document.getElementById('cfgAnthKey').value.trim());
  localStorage.setItem(LS.TG_TOKEN, document.getElementById('cfgTgToken').value.trim());
  localStorage.setItem(LS.TG_CHAN,  document.getElementById('cfgTgChannel').value.trim());
  localStorage.setItem(LS.PROMPT,   document.getElementById('cfgPrompt').value.trim());
  toast('Сохранено', 'ok');
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  const el = document.getElementById('settings');
  const btn = document.getElementById('settingsBtn');
  el.style.display = settingsOpen ? 'block' : 'none';
  btn.classList.toggle('active', settingsOpen);
  if (settingsOpen) loadSettings();
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function step(n, state) {
  const el = document.getElementById('s' + n);
  el.className = 'step ' + state; // idle | active | done
}

let toastTimer = null;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

function updateCount() {
  const n = document.getElementById('draftText').value.length;
  const el = document.getElementById('charCount');
  el.textContent = n + ' / 1024';
  el.className = 'char-count' + (n > 1024 ? ' over' : '');
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function fmtDate(d) {
  // "YYYY-MM-DD" | "YYYY-MM" | "YYYY"
  const p = d.split('-');
  if (p.length === 3) return `${p[2]}.${p[1]}.${p[0]}`;
  if (p.length === 2) return `${p[1]}.${p[0]}`;
  return d;
}

function extractAlbumId(url) {
  const m = url.match(/\/album\/([A-Za-z0-9]+)/);
  return m ? m[1] : null;
}

// ── Spotify ───────────────────────────────────────────────────────────────────
async function spotifyToken(id, secret) {
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {
      'Authorization': 'Basic ' + btoa(id + ':' + secret),
      'Content-Type': 'application/x-www-form-urlencoded'
    },
    body: 'grant_type=client_credentials'
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error('Spotify auth: ' + (e.error_description || r.status));
  }
  return (await r.json()).access_token;
}

async function spotifyAlbum(albumId, token) {
  const r = await fetch(`https://api.spotify.com/v1/albums/${albumId}`, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!r.ok) throw new Error('Spotify album API: ' + r.status);
  const d = await r.json();
  return {
    name:        d.name,
    artist:      d.artists.map(a => a.name).join(', '),
    releaseDate: d.release_date,
    coverUrl:    d.images[0]?.url || '',
    id:          d.id
  };
}

// ── Anthropic agentic loop ────────────────────────────────────────────────────
async function generateFacts(artist, album, apiKey, promptTpl) {
  const userMsg = promptTpl
    .replace(/\{artist\}/g, artist)
    .replace(/\{album\}/g, album);

  const system =
    'Ты эксперт по музыке. Отвечай строго на русском языке. ' +
    'Каждый факт начинай с "• ". Без вступлений, без заключений.';

  let messages = [{ role: 'user', content: userMsg }];

  for (let iter = 0; iter < 10; iter++) {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 1024,
        system,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages
      })
    });

    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      throw new Error('Anthropic: ' + (e.error?.message || resp.status));
    }

    const data = await resp.json();
    messages = [...messages, { role: 'assistant', content: data.content }];

    if (data.stop_reason === 'end_turn') {
      return data.content
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n')
        .trim();
    }

    if (data.stop_reason === 'tool_use') {
      const uses    = data.content.filter(b => b.type === 'tool_use');
      const results = data.content.filter(b => b.type === 'tool_result');

      const toolResultContent = uses.map(u => {
        const existing = results.find(r => r.tool_use_id === u.id);
        return {
          type: 'tool_result',
          tool_use_id: u.id,
          content: existing?.content ?? 'Search complete'
        };
      });

      if (toolResultContent.length) {
        messages = [...messages, { role: 'user', content: toolResultContent }];
      }
    }
  }

  throw new Error('Превышен лимит итераций агентного цикла');
}

// ── Telegram ──────────────────────────────────────────────────────────────────
async function tgSendPhoto(token, chatId, photo, caption) {
  const r = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: chatId, photo, caption, parse_mode: 'HTML' })
  });
  const d = await r.json();
  if (!d.ok) throw new Error('Telegram: ' + (d.description || 'unknown error'));
  return d;
}

// ── Main build ────────────────────────────────────────────────────────────────
async function buildDraft() {
  const url = document.getElementById('spotifyUrl').value.trim();
  if (!url) { toast('Вставь ссылку на альбом', 'err'); return; }

  const albumId = extractAlbumId(url);
  if (!albumId) { toast('Не могу распознать ID альбома', 'err'); return; }

  const spId     = cfg(LS.SP_ID);
  const spSecret = cfg(LS.SP_SEC);
  const anthKey  = cfg(LS.ANTH);
  const prompt   = cfg(LS.PROMPT) || DEFAULT_PROMPT;

  if (!spId || !spSecret) {
    toast('Нет Spotify API — открой настройки', 'err');
    if (!settingsOpen) toggleSettings();
    return;
  }

  // Reset UI
  document.getElementById('buildBtn').disabled = true;
  document.getElementById('result').style.display = 'none';
  const progressEl = document.getElementById('progress');
  progressEl.style.display = 'block';
  [1, 2, 3, 4].forEach(n => step(n, 'idle'));

  try {
    // ① Spotify
    step(1, 'active');
    const token = await spotifyToken(spId, spSecret);
    const album = await spotifyAlbum(albumId, token);
    step(1, 'done');

    // ② Links (no extra call needed)
    step(2, 'active');
    const albumLink = `https://album.link/s/${albumId}`;
    step(2, 'done');

    // ③ Facts
    let facts;
    if (anthKey) {
      step(3, 'active');
      facts = await generateFacts(album.artist, album.name, anthKey, prompt);
      step(3, 'done');
    } else {
      step(3, 'done');
      facts = '• (факты пропущены — нет Anthropic API Key в настройках)';
    }

    // ④ Assemble
    step(4, 'active');
    const date = fmtDate(album.releaseDate);

    const draft =
      `🎵 <b>${esc(album.artist)}</b> — <b>${esc(album.name)}</b>\n\n` +
      `🗓 Дата выхода: ${date}\n\n` +
      `📌 <b>Несколько фактов:</b>\n${facts}\n\n` +
      `<a href="${albumLink}">🎧 Слушать на всех платформах</a>`;

    coverUrl = album.coverUrl;

    document.getElementById('metaCard').innerHTML =
      (album.coverUrl ? `<img class="cover" src="${album.coverUrl}" alt="">` : '') +
      `<div class="meta-info">
        <div class="meta-title">${esc(album.name)}</div>
        <div class="meta-sub">${esc(album.artist)}</div>
        <div class="meta-sub">${date}</div>
        <div class="meta-sub"><a href="${albumLink}" target="_blank">${albumLink}</a></div>
      </div>`;

    document.getElementById('draftText').value = draft;
    updateCount();
    document.getElementById('result').style.display = 'block';
    step(4, 'done');

    // Scroll to result
    setTimeout(() => {
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);

  } catch (err) {
    toast(err.message, 'err');
    console.error('[buildDraft]', err);
  } finally {
    document.getElementById('buildBtn').disabled = false;
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function copyDraft() {
  try {
    await navigator.clipboard.writeText(document.getElementById('draftText').value);
    toast('Скопировано', 'ok');
  } catch {
    toast('Не удалось скопировать', 'err');
  }
}

async function sendPost() {
  const token   = cfg(LS.TG_TOKEN);
  const channel = cfg(LS.TG_CHAN);

  if (!token || !channel) {
    toast('Нет Telegram-настроек', 'err');
    if (!settingsOpen) toggleSettings();
    return;
  }

  const text    = document.getElementById('draftText').value;
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = 'Отправляю…';

  try {
    await tgSendPhoto(token, channel, coverUrl, text);
    toast('Отправлено!', 'ok');
    sendBtn.textContent = '✓ Отправлено';
    setTimeout(() => {
      sendBtn.textContent = 'Отправить в Telegram →';
      sendBtn.disabled = false;
    }, 3000);
  } catch (err) {
    toast(err.message, 'err');
    sendBtn.textContent = 'Отправить в Telegram →';
    sendBtn.disabled = false;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadSettings();
</script>
